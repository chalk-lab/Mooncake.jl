name: Sync PR Summary
description: Update the managed PR summary block from workflow outputs and bot comments.

inputs:
  docs-content:
    description: Documentation preview content to inject into the PR summary.
    required: false
    default: ''
  perf-content:
    description: Performance summary content to inject into the PR summary.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - uses: actions/github-script@v7
      env:
        INPUT_DOCS_CONTENT: ${{ inputs.docs-content }}
        INPUT_PERF_CONTENT: ${{ inputs.perf-content }}
      with:
        github-token: ${{ github.token }}
        script-path: .github/actions/sync-pr-summary/index.js
